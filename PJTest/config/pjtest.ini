# PJTest shared configuration
#
# Edit this file for persistent configuration changes.
# Existing environment variables still override the values below.
# Relative paths are resolved from the PJTest project directory.

[paths]
database = /home/user3/PJTest/data/task_queue.db
template_dir = templates
default_work_root = /home/user3/workspace/galaxcore/test2
report_root = /home/xshare/zhouwei_runcache/Regression/Reports
run_log_dir = ~xiaonan/Share/zw_cache/run_log
scheduler_log_root = /home/user3/PJTest/logs/scheduler
zip_dirs = /home/xshare/zhouwei_runcache/GalaxCore/zip

[scheduler]
host = 0.0.0.0
port = 8888
url = http://192.168.10.11:8888
reconcile_interval_sec = 10
worker_timeout_sec = 300
debug = false
requeue_stale_running = true

[database]
connect_timeout_sec = 60
busy_timeout_ms = 60000
lock_retries = 8
lock_retry_base_sec = 0.25

[reports]
retention_days = 10
recent_attempt_limit = 200
maintenance_interval_sec = 3600
old_dir_name = Old
summary_dir_name = Summary

[http]
admin_request_timeout_sec = 5
health_check_timeout_sec = 3
task_api_default_limit = 50
task_api_max_limit = 200
example_api_default_limit = 500
example_api_max_limit = 2000

[task_defaults]
target_dir = .
suite = night_build
priority = 100
max_retry = 1
max_time_sec = 3600
list_limit = 5
show_limit = 20

[scan]
ignored_dirs =
    .git
    .svn
    __pycache__
    output
    outputs
    result
    results
    report
    reports
    log
    logs

[flow_config]
report_timing_summary = 0
opt_design = 0
place_design = 1
place_design_from_syn = 0
phys_opt_design = 0
route_design = 1
route_design_from_place = 0
write_checkpoint = 0
write_bitstream = 1
bit_cmp = 1
msk_cmp = 1
bgn_cmp = 1
dcp_cmp = 0
checksum_cmp = 0
enable_copy = 1
